site:
  name: Robrix
  site: 'https://robrix.app'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: Robrix
    template: '%s — Robrix'
  description: "A multi-platform Matrix chat client built with Rust and Makepad. Experience seamless messaging across macOS, Linux, Windows, Android, iOS, and more."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Robrix
    images:
      - url: '~/assets/images/og-image.png'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: '@projectrobius'
    site: '@projectrobius'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-90KRWR7WJ1' # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
